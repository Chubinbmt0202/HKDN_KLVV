<!DOCTYPE html>
<html>
<head>
  <style>
    canvas {
      border: 1px solid black;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="c" width="1152" height="48"></canvas>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const img = new Image();
    img.src = 'public/assets/dino_sprites/dino_1.png';
    img.onload = () => {
      // draw scaled up
      ctx.scale(2, 2);
      ctx.drawImage(img, 0, 0);
      
      // draw grid
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 24; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 24, 0);
        ctx.lineTo(i * 24, 24);
        ctx.stroke();
        
        ctx.font = '8px Arial';
        ctx.fillStyle = 'blue';
        ctx.fillText(i, i * 24 + 2, 8);
      }
    };
  </script>
</body>
</html>
